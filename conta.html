<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Minha Conta | Velle Dulcis</title>
</head>

<body>
    <script src="theme-init.js"></script>
    <div class="admin-shell">
        <div class="admin-topbar">
            <a class="admin-topbar__voltar" href="index.html">Voltar para a vitrine</a>

            <div class="admin-topbar__acoes">
                <span id="conta-usuario-nome" class="admin-topbar__usuario">Cliente</span>
                <a class="admin-topbar__sair" href="login.html">Entrar</a>
            </div>
        </div>

        <div class="form-container">
            <h2>Minha conta</h2>
            <p class="form-container__intro">Esta e a versao estatica da area do cliente. Quando a loja roda com PHP, aqui entram enderecos e pedidos reais.</p>

            <input id="conta-nome" type="text" value="Cliente" readonly>
            <input id="conta-email" type="email" value="" readonly>
            <input id="conta-perfil" type="text" value="Perfil: cliente" readonly>

            <p id="conta-mensagem" class="login-form__message" aria-live="polite"></p>
        </div>

        <div class="form-container">
            <h2>Proximo passo</h2>
            <p class="form-container__intro">Para cadastro completo, finalizacao de pedido e historico real, use a versao com PHP ativa.</p>
            <a class="admin-topbar__sair" href="index.html">Voltar para comprar</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="conta.js"></script>
</body>

</html>
