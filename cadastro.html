<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | Velle Dulcis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css?v=20260514-1">
</head>

<body class="login-body login-body--customer">
    <script src="theme-init.js"></script>
    <main class="login-modal-shell">
        <section class="login-modal" aria-labelledby="cadastro-title">
            <a class="login-modal__close" href="index.html" aria-label="Fechar e voltar para a vitrine">
                <span aria-hidden="true">&times;</span>
            </a>

            <div class="login-modal__intro">
                <a class="login-modal__brand" href="index.html" aria-label="Voltar para a vitrine">
                    <img src="logo-velle-dulcis.png" alt="Velle Dulcis">
                </a>
                <h1 id="cadastro-title">Criar conta</h1>
                <p>
                    Cadastre seus dados para acompanhar pedidos e ter acesso a sua area. Na versao com PHP, esse cadastro salva a conta automaticamente.
                </p>
            </div>

            <form id="form-cadastro" class="login-form login-form--customer" novalidate>
                <label class="login-form__field login-form__field--customer">
                    <span>Nome*</span>
                    <input id="cadastro-nome" type="text" placeholder="Seu nome" autocomplete="name" required>
                </label>

                <label class="login-form__field login-form__field--customer">
                    <span>Email*</span>
                    <input id="cadastro-email" type="email" placeholder="Email" autocomplete="email" required>
                </label>

                <label class="login-form__field login-form__field--customer">
                    <span>Senha*</span>
                    <input id="cadastro-senha" type="password" placeholder="Minimo de 6 caracteres" autocomplete="new-password" required>
                </label>

                <label class="login-form__field login-form__field--customer">
                    <span>Confirmar senha*</span>
                    <input id="cadastro-confirmar-senha" type="password" placeholder="Repita sua senha" autocomplete="new-password" required>
                </label>

                <button type="submit">Criar conta</button>
                <p id="cadastro-mensagem" class="login-form__message" aria-live="polite"></p>

                <a class="login-form__create" href="login.html">
                    Ja tenho conta
                    <span aria-hidden="true">&rarr;</span>
                </a>
            </form>

            <p class="login-modal__note">
                Na versao com PHP ativo, o mesmo fluxo salva o cadastro diretamente no banco de dados.
            </p>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="cadastro.js"></script>
</body>

</html>
