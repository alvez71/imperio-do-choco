<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Velle Dulcis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css?v=20260514-1">
</head>
<body class="login-body login-body--customer">
    <script src="theme-init.js"></script>
    <main class="login-modal-shell">
        <section class="login-modal" aria-labelledby="login-title">
            <a class="login-modal__close" href="index.html" aria-label="Fechar e voltar para a vitrine">
                <span aria-hidden="true">&times;</span>
            </a>

            <div class="login-modal__intro">
                <a class="login-modal__brand" href="index.html" aria-label="Voltar para a vitrine">
                    <img src="logo-velle-dulcis.png" alt="Velle Dulcis">
                </a>
                <h1 id="login-title">Login</h1>
                <p>
                    Entre como cliente normalmente. Se as credenciais forem administrativas, o acesso segue direto para o painel.
                </p>
            </div>

            <form id="form-login" class="login-form login-form--customer">
                <label class="login-form__field login-form__field--customer">
                    <span>Email*</span>
                    <input id="email" type="email" placeholder="Email" autocomplete="email" required>
                </label>

                <label class="login-form__field login-form__field--customer">
                    <span>Senha*</span>
                    <input id="senha" type="password" placeholder="Senha" autocomplete="current-password" required>
                </label>

                <div class="login-form__meta">
                    <a class="login-form__assist" href="esqueci_senha.php">Esqueceu sua senha?</a>
                </div>

                <button type="submit">Entrar</button>
                <p id="login-mensagem" class="login-form__message" aria-live="polite"></p>

                <a class="login-form__create" href="cadastro.html">
                    Criar conta
                    <span aria-hidden="true">&rarr;</span>
                </a>
            </form>

            <p class="login-modal__note">
                Use as credenciais corretas e o sistema decide o destino: conta do cliente ou painel administrativo.
            </p>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>

</html>
